<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Logs Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 10px;
            font-size: 2.5em;
            margin-top: 20px;
        }

        .timestamp {
            text-align: center;
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.9em;
            margin-bottom: 30px;
        }

        .logs-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 1024px) {
            .logs-grid {
                grid-template-columns: 1fr;
            }
        }

        .log-card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .log-card h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.8em;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }

        .log-section {
            margin-bottom: 25px;
        }

        .log-section h3 {
            color: #667eea;
            font-size: 1.1em;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .log-entry {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 12px 15px;
            margin-bottom: 10px;
            border-radius: 4px;
            font-size: 0.95em;
        }

        .log-entry p {
            margin: 5px 0;
            color: #555;
        }

        .log-entry p:first-child {
            font-weight: bold;
            color: #333;
        }

        .log-entry .value {
            background: #e3f2fd;
            padding: 2px 6px;
            border-radius: 3px;
            font-weight: 600;
            color: #1976d2;
        }

        .log-entry .time {
            background: #fff3cd;
            padding: 2px 6px;
            border-radius: 3px;
            font-weight: 600;
            color: #856404;
        }

        .log-entry .status {
            background: #d4edda;
            padding: 2px 6px;
            border-radius: 3px;
            font-weight: 600;
            color: #155724;
        }

        .log-entry .date {
            font-size: 0.85em;
            color: #999;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid #ddd;
        }

        .leaderboard-entry {
            display: flex;
            align-items: center;
            padding: 12px;
            background: #f8f9fa;
            margin-bottom: 8px;
            border-radius: 4px;
            border-left: 4px solid #764ba2;
        }

        .leaderboard-entry .rank {
            background: #764ba2;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            margin-right: 12px;
            font-weight: bold;
            min-width: 40px;
            text-align: center;
        }

        .leaderboard-entry .name {
            flex-grow: 1;
            font-weight: 600;
            color: #333;
        }

        .leaderboard-entry .score {
            background: #e8eaf6;
            padding: 4px 12px;
            border-radius: 20px;
            color: #667eea;
            font-weight: bold;
        }

        .error {
            background: #ffebee;
            border-left: 4px solid #f44336;
            color: #c62828;
            padding: 15px;
            border-radius: 4px;
            margin: 10px 0;
        }

        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            padding: 10px 20px;
            background: white;
            color: #667eea;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            border: 2px solid white;
            cursor: pointer;
            transition: 0.3s;
        }

        .back-btn:hover {
            background: transparent;
            color: white;
        }

        .loading {
            text-align: center;
            color: white;
            font-size: 1.2em;
            padding: 40px;
        }
    </style>
</head>

<body>
    <div class="container">
        <button class="back-btn" onclick="window.history.back()">← Back to Hub</button>
        <h1>🎮 Game Logs Dashboard</h1>
        <p class="timestamp" id="timestamp">Updating...</p>

        <div class="logs-grid">
            <!-- Traffic Simulation -->
            <div class="log-card">
                <h2>🚗 Traffic Simulation</h2>

                <div class="log-section">
                    <h3>Recent Rounds</h3>
                    <div id="ts-rounds"></div>
                </div>

                <div class="log-section">
                    <h3>Leaderboard</h3>
                    <div id="ts-wins"></div>
                </div>
            </div>

            <!-- Knight's Tour -->
            <div class="log-card">
                <h2>♞ Knight's Tour</h2>

                <div class="log-section">
                    <h3>Recent Games</h3>
                    <div id="kt-games"></div>
                </div>

                <div class="log-section">
                    <h3>Winners</h3>
                    <div id="kt-winners"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function fetchLogs() {
            try {
                const response = await fetch("http://127.0.0.1:8002/api/logs");
                const data = await response.json();

                document.getElementById("timestamp").textContent =
                    `Last updated: ${new Date(data.timestamp).toLocaleTimeString()}`;

                // Traffic Simulation
                const ts = data.traffic_simulation || {};
                displayTrafficSimulation(ts);

                // Knight's Tour
                const kt = data.knights_tour || {};
                displayKnightsTour(kt);

            } catch (error) {
                console.error("Error:", error);
            }
        }

        function displayTrafficSimulation(ts) {
            const roundsDiv = document.getElementById("ts-rounds");
            const winsDiv = document.getElementById("ts-wins");

            if (ts.error) {
                roundsDiv.innerHTML = `<p class="error">Error: ${ts.error}</p>`;
                winsDiv.innerHTML = ``;
                return;
            }

            roundsDiv.innerHTML = (ts.rounds || []).map(r => `
                <div class="log-entry">
                    <p><strong>Round ${r.id}</strong></p>
                    <p>Max Flow: <span class="value">${r.correct_max_flow}</span></p>
                    <p>Ford-Fulkerson: <span class="time">${r.ff_time_ms.toFixed(4)}ms</span></p>
                    <p>Edmonds-Karp: <span class="time">${r.ek_time_ms.toFixed(4)}ms</span></p>
                    <p class="date">${new Date(r.created_at).toLocaleString()}</p>
                </div>
            `).join("") || "<p>No rounds yet</p>";

            winsDiv.innerHTML = (ts.wins || []).map((w, i) => `
                <div class="leaderboard-entry">
                    <span class="rank">#${i + 1}</span>
                    <span class="name">${w.player_name}</span>
                    <span class="score">${w.wins_count} wins</span>
                </div>
            `).join("") || "<p>No wins yet</p>";
        }

        function displayKnightsTour(kt) {
            const gamesDiv = document.getElementById("kt-games");
            const winnersDiv = document.getElementById("kt-winners");

            if (kt.error) {
                gamesDiv.innerHTML = `<p class="error">Error: ${kt.error}</p>`;
                winnersDiv.innerHTML = ``;
                return;
            }

            gamesDiv.innerHTML = (kt.games || []).map(g => `
                <div class="log-entry">
                    <p><strong>Game ${g.id}</strong></p>
                    <p>Board Size: <span class="value">${g.board_size}x${g.board_size}</span></p>
                    <p>Mode: <span class="value">${g.mode}</span></p>
                    <p>Status: <span class="status">${g.status}</span></p>
                    <p class="date">${new Date(g.created_at).toLocaleString()}</p>
                </div>
            `).join("") || "<p>No games yet</p>";

            winnersDiv.innerHTML = (kt.winners || []).map((w, i) => `
                <div class="leaderboard-entry">
                    <span class="rank">#${i + 1}</span>
                    <span class="name">${w.player_name}</span>
                    <span class="score">${w.wins_count} wins</span>
                </div>
            `).join("") || "<p>No winners yet</p>";
        }

        // Initial load
        fetchLogs();

        // Refresh every 3 seconds
        setInterval(fetchLogs, 3000);
    </script>
</body>

</html>
