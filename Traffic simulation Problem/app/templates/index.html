<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Traffic Max-Flow Game</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <main class="container">
      <h1>Traffic Simulation: Max Flow</h1>
      <p class="subtitle">Find the maximum vehicles/min from A to T</p>

      <section class="board">
        <svg id="network" viewBox="0 0 980 380" aria-label="Traffic network graph"></svg>
      </section>

      <section class="controls">
        <label>
          Player name (for wins)
          <input id="playerName" type="text" maxlength="40" placeholder="Your name" />
        </label>
        <label>
          Your max-flow answer
          <input id="answer" type="number" min="0" placeholder="e.g. 34" />
        </label>
        <div class="buttons">
          <button id="newRoundBtn">New Round</button>
          <button id="submitBtn">Submit Answer</button>
        </div>
      </section>

      <section class="result" id="resultBox">Press <strong>New Round</strong> to start.</section>

      <section class="leaderboard">
        <h2>Leaderboard</h2>
        <ul id="leaderboardList"></ul>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
